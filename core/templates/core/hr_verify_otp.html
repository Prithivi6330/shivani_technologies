<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container text-center" style="max-width: 400px;">
        <div class="card p-4 shadow-sm border-0 rounded-3">
            <h4 class="fw-bold text-dark mb-3">Enter OTP 🔑</h4>
            {% if messages %}
                {% for msg in messages %}<div class="alert alert-info small">{{ msg }}</div>{% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="otp" class="form-control text-center fs-4 mb-3" placeholder="6-Digit OTP" required>
                <button type="submit" class="btn btn-success w-100">Verify Account</button>
            </form>
        </div>
    </div>
</body>
</html>
