<!DOCTYPE html>
<html>
<head>
    <title>Candidate Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">
        <h3 class="text-center mb-4 text-success">Candidate Login</h3>
        <form method="POST" action="{% url 'candidate_login' %}">
    {% csrf_token %}
    
    <!-- உங்க யூசர்நேம் இன்புட் (Make sure name="username") -->
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    
    <!-- உங்க பாஸ்வேர்ட் இன்புட் (Make sure name="password") -->
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    
    <button type="submit" class="btn btn-primary w-100">Login</button>
</form>
        <p class="mt-3 text-center small">New user? <a href="{% url 'candidate_register' %}">Register here</a></p>
    </div>
</body>
</html>
