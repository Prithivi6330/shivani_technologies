<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Login | Shivani Tech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            padding: 40px;
            max-width: 460px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .btn-primary {
            background-color: #4f46e5;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .input-group-text {
            border-color: #e2e8f0;
        }
        .form-control {
            border-color: #e2e8f0;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <span class="p-3 bg-indigo-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="font-size: 2rem; background: #e0e7ff; width: 70px; height: 70px;">
            <i class="fa-solid fa-user-tie text-primary"></i>
        </span>
    </div>
    
    <h3 class="fw-bold text-dark mb-2 text-center">HR Portal Login</h3>
    <p class="text-muted small mb-4 text-center">Enter your HR / Recruiter credentials to access dashboard</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if 'success' in message.tags %}alert-success{% else %}alert-danger{% endif %} small p-2 text-center rounded-3 mb-3" role="alert">
                <i class="fa-solid {% if 'success' in message.tags %}fa-circle-check{% else %}fa-triangle-exclamation{% endif %} me-1"></i>
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3 text-start">
            <label class="form-label fw-semibold small text-secondary">Username / Email</label>
            <div class="input-group shadow-sm-on-focus">
                <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-user small"></i></span>
                <input type="text" name="username" 
       class="form-control bg-light border-start-0 py-2 fs-6" 
       placeholder="hr_username" 
       required 
       autocomplete="off" 
       onfocus="this.removeAttribute('readonly');" 
       readonly>
            </div>
        </div>
        
        <div class="mb-4 text-start">
            <label class="form-label fw-semibold small text-secondary">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light text-muted border-end-0"><i class="fa-solid fa-lock small"></i></span>
                <input type="password" name="password" class="form-control bg-light border-start-0 py-2 fs-6" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold py-2.5 mb-4 shadow-sm fs-6" 
                onclick="this.innerText='Logging in...'; this.disabled=true; this.form.submit();">
            Login as HR <i class="fa-solid fa-arrow-right ms-1"></i>
        </button>
        
        <div class="text-center pt-2 border-top">
            <p class="text-muted small mb-3">புதிய HR கணக்கு உருவாக்க வேண்டுமா? 
                <a href="{% url 'hr_register' %}" class="text-primary fw-semibold text-decoration-none ms-1">Register Here</a>
            </p>
            <a href="{% url 'home' %}" class="text-decoration-none small text-muted hover-dark"><i class="fa-solid fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </form> 
</div>

</body>
</html>
