<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Company Profile Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 750px;">
        <div class="card p-4 shadow-sm border-0 rounded-3">
            <div class="d-flex align-items-center mb-4">
                <div class="p-3 bg-info-subtle rounded-3 text-info me-3 fs-3"><i class="fa-solid fa-building"></i></div>
                <div>
                    <h3 class="fw-bold text-dark m-0">Company Profile Setup</h3>
                    <p class="text-muted m-0">LinkedIn கம்பெனி பேஜ் போன்ற முழு விவரங்களை உள்ளிடவும்.</p>
                </div>
            </div>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-dark w-100 mt-4 py-2 fs-5"><i class="fa-solid fa-cloud-arrow-up me-2"></i>Save Company Details</button>
            </form>
        </div>
    </div>
</body>
</html>
