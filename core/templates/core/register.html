<!DOCTYPE html>
<html>
<head>
    <title>Candidate Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow border-0 p-4 rounded-3 bg-white" style="width: 100%; max-width: 450px;">
        
        <h3 class="text-center fw-bold text-primary mb-4">Candidate Register</h3>

        <!-- Django Messages (Error / Success alert காட்ட) -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center py-2 mb-3 small rounded-3" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'register' %}">
    {% csrf_token %}
    
    <div class="mb-3">
        <label class="form-label fw-semibold text-secondary">Username</label>
        <input type="text" name="username" class="form-control p-2.5 rounded-3" placeholder="Enter username" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold text-secondary">Email Address</label>
        <input type="email" name="email" class="form-control p-2.5 rounded-3" placeholder="Enter email address" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold text-secondary">Password</label>
        <input type="password" name="password" class="form-control p-2.5 rounded-3" placeholder="Enter password" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold text-secondary">Register As</label>
        <select name="role" class="form-select p-2.5 rounded-3" required>
             <option value="candidate">Candidate</option>
             <option value="hr">HR</option>
             <option value="admin">Admin</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-3 mt-2 shadow-sm">Register</button>
</form>
            

        <!-- Login Link -->
        <div class="text-center mt-3 small">
            <span class="text-muted">Already have an account?</span> 
            <a href="{% url 'candidate_login' %}" class="text-decoration-none fw-semibold">Login here</a>
        </div>

    </div>
</div>
</body>
</html>
