{% extends 'base.html' %} {% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h3>OTP Verification</h3>
            <p>Please enter the 6-digit code sent to your email.</p>

            <form method="POST" id="otp-form">
                {% csrf_token %}
                <div class="otp-container d-flex justify-content-center">
                    <input type="text" name="otp_1" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric" required>
                    <input type="text" name="otp_2" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric" required>
                    <input type="text" name="otp_3" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric" required>
                    <input type="text" name="otp_4" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric" required>
                    <input type="text" name="otp_5" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric" required>
                    <input type="text" name="otp_6" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric" required>
                </div>
                <button type="submit" class="btn btn-primary mt-4 w-50">Verify OTP</button>
            </form>
        </div>
    </div>
</div>

<style>
    .otp-input {
        width: 45px;
        height: 55px;
        text-align: center;
        font-size: 20px;
        margin: 5px;
        border: 2px solid #ced4da;
        border-radius: 8px;
    }
    .otp-input:focus {
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0,123,255,0.5);
        outline: none;
    }
</style>

<script>
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
        // Backspace adicha pinnadi box-ku poga
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
</script>

{% endblock %}
