<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for {{ job.title }} | Shivani Technologies</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        .form-header {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            padding: 30px;
            position: relative;
        }
        .form-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #4f46e5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .input-group-text {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            border-radius: 10px 0 0 10px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-submit:hover {
            opacity: 0.95;
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .file-upload-wrapper:hover {
            border-color: #3b82f6;
            background-color: #f0f5ff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9 animate__animated animate__fadeInUp">
            
            <div class="glass-card">
                <div class="form-header text-center">
                    <span class="badge bg-white text-primary mb-2 py-2 px-3 fw-semibold">Career Opportunity</span>
                    <h2 class="fw-bold mb-1">{{ job.title }}</h2>
                    <p class="mb-0 opacity-75"><i class="fa-solid var(--fa-building)"></i> {{ job.company.name }}</p>
                </div>

                <div class="p-4 p-sm-5">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="form-section-title">
                            <i class="fa-solid fa-address-book"></i> Contact Information
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-phone text-muted"></i></span>
                                <input type="text" name="phone_number" class="form-control" required placeholder="+91 98765 43210">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium text-secondary">Permanent Address</label>
                            <textarea name="address" class="form-control" rows="3" required placeholder="Enter your full address..."></textarea>
                        </div>

                        <div class="form-section-title">
                            <i class="fa-solid fa-briefcase"></i> Professional Details
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-secondary">Target Designation</label>
                                <input type="text" name="designation" class="form-control" required placeholder="e.g. Full Stack Developer">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-secondary">Key Skills</label>
                                <input type="text" name="skills" class="form-control" required placeholder="Python, Django, React">
                            </div>
                        </div>

                        <div class="form-section-title">
                            <i class="fa-solid fa-graduation-cap"></i> Education Qualifications
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-medium text-secondary">10th Percentage</label>
                                <input type="number" step="0.01" name="tenth_percentage" class="form-control" required placeholder="e.g. 85.50">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-medium text-secondary">12th Percentage</label>
                                <input type="number" step="0.01" name="twelfth_percentage" class="form-control" required placeholder="e.g. 90.20">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-medium text-secondary">College CGPA</label>
                                <input type="number" step="0.01" name="college_cgpa" class="form-control" required placeholder="e.g. 8.75">
                            </div>
                        </div>

                        <div class="form-section-title">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Documents
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-secondary">Upload Resume (PDF/DOCX)</label>
                            <div class="file-upload-wrapper">
                                <i class="fa-solid fa-file-pdf fa-2x text-primary mb-2"></i>
                                <p class="mb-1 fw-medium text-dark">Click to browse or drag your file here</p>
                                <span class="text-muted small">Max file size: 5MB</span>
                                <input type="file" name="resume" class="form-control mt-2" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-submit w-100 mt-2">
                            <i class="fa-solid fa-paper-plane me-2"></i> Submit Extraordinary Application
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
